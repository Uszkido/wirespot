name: wirespot
description: Secure MikroTik RouterOS hotspot management over WireGuard VPN.
publish_to: "none"
version: 0.1.26+27

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0
  get_it: ^8.0.0
  dio: ^5.0.0
  drift: ^2.0.0
  sqlite3: ^3.5.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.0
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.4.0
  image_picker: ^1.1.2
  esc_pos_utils_plus: ^2.0.0
  intl: ^0.20.2
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
