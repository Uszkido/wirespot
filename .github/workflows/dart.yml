# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart (Flutter runner)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use a Flutter setup action (installs the Flutter SDK)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Optional: cache pub packages to speed subsequent runs
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test
