name: Bug report
description: Report a reproducible WireSpot problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real router passwords, WireGuard private keys, Android signing keys, license secrets, or customer data.
        Security-sensitive issues must be reported privately using SECURITY.md.
  - type: input
    id: version
    attributes:
      label: WireSpot version
      placeholder: "0.1.24+25"
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android device and version
      placeholder: "Samsung A15, Android 14"
    validations:
      required: true
  - type: input
    id: routeros
    attributes:
      label: RouterOS version and router board
      placeholder: "RouterOS 7.19.6, L009UiGS-2HaxD"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication / PIN / biometric
        - Router connection
        - RouterOS API
        - WireGuard / VPN
        - Hotspot users / profiles / sessions
        - Vouchers / QR / receipts
        - Bluetooth printing
        - Reports / export
        - Settings / language / currency
        - Licensing / trial / activation
        - Co-branding
        - Android build
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: connection_mode
    attributes:
      label: Router connection mode
      options:
        - Local LAN
        - WireGuard remote
        - No router involved
        - Not sure
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open WireSpot
        2. Go to ...
        3. Tap ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before posting.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed router passwords, WireGuard private keys, license secrets, and customer data.
          required: true
